<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    background: #ffffff;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #app {
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 16px;
  }

  #diagram-wrap {
    width: 100%;
  }

  #diagram-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .node-box { cursor: pointer; }
  .node-box:hover rect { opacity: 0.82; }
  .node-box.active rect { stroke-width: 2.5px !important; }

  #detail-panel {
    display: none;
    border-top: 1px solid #e5e5e5;
    padding: 20px 24px;
    background: #f8f8f8;
    border-radius: 0 0 12px 12px;
    margin-top: 4px;
  }

  #detail-panel.visible { display: block; }

  #detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  #detail-title-wrap { display: flex; align-items: center; gap: 10px; }

  #detail-title {
    font-size: 15px;
    font-weight: 600;
    color: #111;
  }

  #detail-badge {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 500;
  }

  #close-btn {
    background: #fff;
    border: 1px solid #d5d5d5;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    color: #555;
    transition: background .15s;
  }
  #close-btn:hover { background: #f0f0f0; }

  #detail-body {
    font-size: 13.5px;
    color: #444;
    line-height: 1.75;
    column-count: 2;
    column-gap: 32px;
  }

  #detail-body h4 {
    font-size: 13px;
    font-weight: 600;
    color: #111;
    margin: 12px 0 3px;
    break-after: avoid;
  }

  #detail-body p { margin-bottom: 6px; }

  #detail-body h4:first-child { margin-top: 0; }

  #footer {
    text-align: center;
    font-size: 11px;
    color: #aaa;
    padding: 10px 0 4px;
  }

  /* SVG text styles */
  .t  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #1a1a1a; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #555; }
  .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #1a1a1a; }
</style>

<script>
const CONTENT = {
  'ai-ml': {
    title: 'AI & ML — the learning foundation',
    badge: 'Layer 1', badgeColor: '#5F5E5A', badgeBg: '#E8E6DC',
    html: `<h4>Supervised learning</h4><p>Models trained on labeled input-output pairs. Given enough examples, they generalize to new inputs. Underpins image classifiers, toxicity detectors, and most clinical prediction models.</p>
      <h4>Unsupervised learning</h4><p>Finding structure in unlabeled data — clustering patients by gene expression, compressing high-dimensional omics data, detecting anomalies without knowing what "normal" looks like.</p>
      <h4>Reinforcement learning</h4><p>An agent learns by taking actions and receiving rewards. Critical for agentic AI — it's how agents learn to sequence tool calls, recover from failures, and optimize long-horizon goals. RLHF is how modern LLMs are aligned.</p>
      <h4>Reasoning & problem solving</h4><p>Beyond pattern recognition — symbolic reasoning, constraint satisfaction, logical inference. Modern LLMs blend statistical and symbolic approaches, enabling multi-step deduction over complex inputs.</p>`
  },
  'nn': {
    title: 'Neural networks — the architecture layer',
    badge: 'Layer 1', badgeColor: '#5F5E5A', badgeBg: '#E8E6DC',
    html: `<h4>CNNs (convolutional neural networks)</h4><p>Exploit spatial locality via shared filters — dominant for image and genomic sequence data, where nearby features are strongly correlated.</p>
      <h4>RNNs & LSTMs</h4><p>Process sequential data with recurrent connections. LSTMs add gating mechanisms to preserve long-range dependencies — foundational for NLP before transformers replaced them.</p>
      <h4>Transformers</h4><p>The current dominant architecture. Process entire sequences in parallel via self-attention, enabling massive scaling. GPT, BERT, and all modern LLMs are transformer-based.</p>
      <h4>Attention mechanisms</h4><p>Each output element attends to all input elements with learned weights. This allows models to capture long-range dependencies and context — the key innovation that makes LLMs powerful.</p>
      <h4>Deep belief networks</h4><p>Stacked generative models — precursors to modern deep learning, still used in specific generative and density estimation tasks where explicit probabilistic structure is needed.</p>`
  },
  'outputs': {
    title: 'Outputs & interfaces — what agents produce',
    badge: 'Layer 1', badgeColor: '#085041', badgeBg: '#C8EEE1',
    html: `<h4>Code generation</h4><p>LLMs write, debug, and refactor code across dozens of languages. In agentic settings, code generation becomes a tool — agents write scripts to process data, call APIs, or automate workflows on the fly.</p>
      <h4>Image & video synthesis</h4><p>Diffusion models generate photorealistic images and videos from text prompts. Increasingly used in drug discovery (molecular visualization), clinical report illustration, and research communication.</p>
      <h4>Audio generation</h4><p>Text-to-speech (TTS), speech recognition (ASR), and music generation. Enables voice-based agent interfaces and audio data processing pipelines.</p>
      <h4>Dashboards & recommendations</h4><p>Structured, queryable outputs — the interface between AI reasoning and human decision-making. Particularly relevant for translational data science where insights must be communicated to non-technical stakeholders.</p>`
  },
  'knowledge': {
    title: 'Knowledge — grounding agents in facts',
    badge: 'Layer 2', badgeColor: '#085041', badgeBg: '#C8EEE1',
    html: `<h4>Retrieval-augmented generation (RAG)</h4><p>At query time, relevant documents are retrieved from a corpus and injected into the LLM's context. The model reasons over retrieved evidence rather than memorized weights. Essential for literature review agents and clinical guideline bots.</p>
      <h4>Vector search</h4><p>Text, images, or molecular structures are embedded into a high-dimensional semantic space. Nearest-neighbor search retrieves semantically similar items — far more powerful than keyword matching and the backbone of modern RAG pipelines.</p>
      <h4>Knowledge graphs</h4><p>Structured representations of entities and relationships (drug → targets → pathways). Enable reasoning over structured facts — critical for drug discovery, target identification, and biomarker discovery pipelines.</p>
      <h4>Semantic retrieval</h4><p>Understanding intent and meaning rather than surface-level text matching. Enables agents to find relevant knowledge even when the user's phrasing doesn't match document terminology exactly.</p>`
  },
  'tools': {
    title: 'Tool use — agents that act on the world',
    badge: 'Layer 2', badgeColor: '#085041', badgeBg: '#C8EEE1',
    html: `<h4>Function calling</h4><p>The LLM generates a structured JSON call specifying which tool to invoke and with what parameters. The tool executes and returns a result the LLM incorporates into its next reasoning step. Supported natively by modern APIs.</p>
      <h4>API integration</h4><p>Agents query PubMed, ClinicalTrials.gov, internal databases, EHR systems, and proprietary platforms — anything with an API becomes a tool. Enables agents to access live, domain-specific information at runtime.</p>
      <h4>Plugins & dynamic tooling</h4><p>Rather than a fixed toolset, advanced agents discover and load tools at runtime — selecting the right instrument for the task at hand. This is the agent marketplace concept: specialized tools available on demand.</p>
      <h4>Tool orchestration</h4><p>Managing multi-tool workflows — sequencing tool calls, handling dependencies, parallelizing when safe, and aggregating results. The orchestration layer separates a capable agent from a simple chatbot with a search button.</p>`
  },
  'memory': {
    title: 'Memory systems — agents that remember',
    badge: 'Layer 2', badgeColor: '#085041', badgeBg: '#C8EEE1',
    html: `<h4>Working memory (short-term)</h4><p>The active context window — everything the model currently "sees." Limited in size. Agents must decide what to keep in working memory and what to offload to longer-term stores to avoid overflow.</p>
      <h4>Episodic memory</h4><p>A log of past actions, observations, and outcomes. Retrieved by relevance at query time via RAG. Enables agents to recall "last time I ran this pipeline, step 3 failed because of X" and avoid repeating mistakes.</p>
      <h4>Semantic memory</h4><p>Distilled, generalized knowledge — facts, rules, preferences — extracted from episodic memory and stored in vector databases or knowledge graphs. More efficient than replaying raw episode logs.</p>
      <h4>Procedural memory</h4><p>Learned action sequences stored as tools, code templates, or fine-tuned model weights. The agent "knows how" to do something without re-deriving it from scratch each time.</p>
      <h4>State persistence</h4><p>For long-running tasks, agents checkpoint their state so work survives session boundaries, failures, and restarts — critical for multi-day workflows like systematic reviews or continuous trial monitoring.</p>`
  },
  'reasoning': {
    title: 'Reasoning — structured thinking in agents',
    badge: 'Layer 2', badgeColor: '#3C3489', badgeBg: '#DDDCFC',
    html: `<h4>ReAct (Reason + Act)</h4><p>Interleaves reasoning traces with tool calls: think → act → observe → think again. This tight loop between cognition and action is the dominant paradigm for tool-using agents. Enables agents to course-correct mid-task.</p>
      <h4>Chain-of-thought (CoT)</h4><p>Prompting the model to reason step-by-step before producing an answer significantly improves accuracy on complex tasks. "Let's think through this" restructures the computation, not just the presentation.</p>
      <h4>Tree-of-thought (ToT)</h4><p>Rather than a single chain of reasoning, the agent explores multiple branches, evaluates them, and selects the most promising path. Analogous to beam search for reasoning — better for tasks with many plausible solution paths.</p>
      <h4>Planning</h4><p>Decomposing a high-level goal into a dependency graph of sub-tasks, then scheduling and executing them. LLM-based planners implement this as graph traversal — essential for end-to-end systematic reviews and complex R&D workflows.</p>`
  },
  'coordination': {
    title: 'Agent coordination — teams of agents',
    badge: 'Layer 3', badgeColor: '#3C3489', badgeBg: '#DDDCFC',
    html: `<h4>Multi-agent collaboration</h4><p>A planner agent decomposes tasks and delegates to specialist agents (literature search, data extraction, statistical analysis). Results are aggregated by a synthesis agent. Mirrors how research teams work — and maps directly onto systematic review workflows.</p>
      <h4>Task scheduling</h4><p>Determining which sub-tasks can run in parallel vs. sequentially, managing dependencies, and allocating compute resources. Critical for large-scale pipelines — e.g., screening 50,000 abstracts across multiple parallel agents.</p>
      <h4>Agent protocols</h4><p>Standardized message formats and handoff interfaces between agents — the API contracts of the multi-agent world. Emerging standards include OpenAI's function-calling schema and Anthropic's tool use API.</p>
      <h4>Delegation & handoff</h4><p>When an agent recognizes it's outside its competence, it routes the task to a more appropriate specialist. Requires capability awareness and trust scoring between agents in the network.</p>`

    html: `<h4>Autonomous execution</h4><p>Running multi-step task chains without human prompting at each step. The agent decides what to do next based on its current state and goal — a qualitative shift from chatbot interactions where humans drive every step.</p>
      <h4>Failure recovery & replanning</h4><p>When a tool fails, a search returns nothing, or an assumption proves wrong, the agent detects the failure, diagnoses the cause, and generates an alternative plan. Robust failure handling separates production agents from research demos.</p>
      <h4>Output validation</h4><p>Checking agent outputs for correctness, consistency, and safety before acting on them. Can use a separate critic agent, formal verifiers, or confidence scoring. Particularly critical in clinical and regulatory contexts.</p>
      <h4>Dynamic tooling</h4><p>Discovering and loading tools at runtime rather than relying on a fixed toolset. Enables agents to adapt to new task types without retraining — they find the right tool for the job from an available catalog.</p>`

  'autonomy': {

    html: `<h4>Goal chaining</h4><p>Decomposing high-level goals into directed graphs of sub-goals, each with preconditions and success criteria. Agents execute the graph, marking sub-goals complete and unlocking downstream tasks. Frameworks like LangGraph implement this as stateful graph traversal.</p>
      <h4>Resource allocation</h4><p>Budgeting compute, API calls, time, and cost across a long task. Token budgeting truncates low-priority context; priority queues schedule sub-tasks by urgency; learned cost models decide when to invoke expensive tools vs. cheaper approximations.</p>
      <h4>Self-reflection</h4><p>Periodically re-examining progress against the original goal — catching drift before it compounds. Implemented as a meta-cognitive loop: "Am I still on track? Is my current plan the best path to the goal?" Critic agents can formalize this.</p>
      <h4>Self-improvement</h4><p>Agents that learn from their own failures — analyzing what went wrong, updating their action policies, and performing better on similar tasks in the future. Closes the loop between performance and capability, enabling agents that improve with use.</p>`

      <h4>Feedback integration</h4><p>Human corrections are fed back into the agent's memory and optionally used to fine-tune the model. This creates a virtuous cycle: human expertise improves agent performance over time, reducing the need for oversight.</p>
      <h4>Rollback mechanisms</h4><p>The ability to undo agent actions — reverting to a prior state when a mistake is detected. Requires careful state management: agents must checkpoint at each significant action so rollback is possible without losing all progress.</p>
      <h4>Escalation protocols</h4><p>When an agent encounters a situation outside its training distribution, it must recognize the gap and escalate rather than guess. Confidence scoring and anomaly detection are the technical mechanisms; clear paths to domain experts are the organizational requirement.</p>`

    html: `<h4>Risk management</h4><p>Identifying, quantifying, and mitigating risks before they materialize. For agentic systems: data leakage, incorrect outputs in downstream decisions, runaway tool use, and adversarial manipulation of agent behavior.</p>
      <h4>Governance frameworks</h4><p>Organizational structures for oversight — who approves agentic deployments, how incidents are reported, what the escalation path is. In pharma, this intersects directly with GxP and regulatory compliance frameworks.</p>
      <h4>Feedback evaluators</h4><p>Automated systems that continuously assess agent output quality — catching degradation before it reaches users. Can be rule-based (output must match schema), model-based (critic LLM scores outputs), or statistical (monitor output distribution for drift).</p>
      <h4>Constraint satisfaction</h4><p>Hard rules the agent cannot violate regardless of its reasoning — rate limits, access controls, data handling policies. Implemented at the infrastructure level, not as soft prompts the agent can reason around.</p>`

      <h4>Memory retention policy</h4><p>Governing what agent memories are kept, for how long, and who can access them. Intersects with data privacy regulations (GDPR, HIPAA) — particularly critical when agents process patient data or proprietary research.</p>
      <h4>Cost & resource monitoring</h4><p>Tracking compute, API usage, and spend in real time. Agentic systems can consume orders of magnitude more resources than chatbots — without monitoring, costs can spiral unexpectedly across large-scale deployments.</p>
      <h4>Contact management</h4><p>Tracking which agent instances accessed which data, when, and for what purpose. Enables auditing, access revocation, and incident response when a breach or error is detected in the pipeline.</p>`

      <h4>AI fairness</h4><p>Ensuring agent outputs don't systematically disadvantage protected groups. In clinical AI, this means auditing model performance across demographics — directly relevant to biomarker-based patient stratification and companion diagnostic development.</p>
      <h4>Explainability (XAI)</h4><p>Explaining why an agent produced a given output in terms humans can understand and verify. Methods include LIME, SHAP, attention visualization, and natural language justification generation. Required for regulatory submissions and clinical adoption.</p>
      <h4>Bias detection & mitigation</h4><p>Systematically identifying and correcting biases in training data, model outputs, and agent behavior. Particularly important when agents are trained on historically biased datasets — most biomedical literature over-represents European ancestry populations.</p>`

      <h4>Agent marketplaces & ecosystems</h4><p>Specialized agents bought, sold, and composed like microservices. A "clinical trial screener" or "oncology literature agent" you license and plug into your pipeline. OpenAI's GPT store and Anthropic's tool ecosystem are early versions of this model.</p>
      <h4>Multi-agent collaboration at scale</h4><p>Coordinated systems of dozens of specialist agents — planner, coder, reviewer, domain expert — with structured handoff protocols. The research team metaphor made real: each agent contributes its specialty to a shared scientific goal.</p>
      <h4>Physical world integration</h4><p>Agents operating GUIs, robotic systems, lab instruments, and IoT devices — blurring the line between digital reasoning and physical action. Lab automation agents could design, run, and analyze experiments end-to-end without human intervention.</p>

let activeBox = null;

function showBox(id) {
  const data = CONTENT[id];
  if (!data) return;
  if (activeBox) document.getElementById('box-' + activeBox)?.classList.remove('active');
  activeBox = id;
  document.getElementById('box-' + id)?.classList.add('active');
  document.getElementById('detail-title').textContent = data.title;
  const badge = document.getElementById('detail-badge');
  badge.textContent = data.badge;
  badge.style.background = data.badgeBg;
  badge.style.color = data.badgeColor;
  document.getElementById('detail-body').innerHTML = data.html;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('visible');
  if (activeBox) {
    document.getElementById('box-' + activeBox)?.classList.remove('active');
    activeBox = null;
  }
}
</script>
